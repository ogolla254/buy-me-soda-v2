<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Buy Me a Soda 🥤</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="form-container">
            <h1 class="form-title">Create Your Soda Page 🥤</h1>
            
            <form id="signupForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" name="name" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-input" required>
                    <small class="form-hint">This will be your page: buymesoda.com/username</small>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="paypalMe" class="form-label">PayPal.Me Link</label>
                    <input type="url" id="paypalMe" name="paypalMe" class="form-input" 
                           placeholder="https://paypal.me/yourusername" required>
                </div>
                
                <div class="form-group">
                    <label for="profilePicture" class="form-label">Profile Picture (Optional)</label>
                    <input type="file" id="profilePicture" name="profilePicture" class="form-input" accept="image/*">
                </div>
                
                <div class="form-group">
                    <label for="bio" class="form-label">Short Bio (Optional)</label>
                    <textarea id="bio" name="bio" class="form-input" rows="3" 
                              placeholder="Tell people about yourself..."></textarea>
                </div>
                
                <button type="submit" class="submit-button">Create My Page</button>
            </form>
            
            <div class="auth-links">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
