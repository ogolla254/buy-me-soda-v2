<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Buy Me a Soda 🥤</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" class="nav-logo-link">
                    <h2>Buy Me a Soda 🥤</h2>
                </a>
            </div>
            <div class="nav-links">
                <a href="#" class="dark-mode-toggle"><span class="icon">🌙</span></a>
                <a href="login.html" class="btn btn-login">Login</a>
                <a href="signup.html" class="btn btn-signup">🥤 Sign Up</a>
            </div>
        </div>
    </nav>
    
    <div class="main-container">
        <div class="form-container">
            <div class="login-header">
                <div class="soda-emoji">🥤</div>
                <h1 class="welcome-title">Join Creator Community</h1>
                <p class="login-subtitle">Start receiving support from your fans</p>
            </div>
            
            <form id="signupForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" name="name" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-input" required>
                    <small class="form-hint">This will be your page: buymesoda.com/username</small>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-input-container">
                        <input type="password" id="password" name="password" class="form-input" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <span id="toggleIcon">👁️</span>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="paypalMe" class="form-label">PayPal.Me Link</label>
                    <input type="url" id="paypalMe" name="paypalMe" class="form-input" 
                           placeholder="https://paypal.me/yourusername" required>
                </div>
                
                <div class="form-group">
                    <label for="profilePicture" class="form-label">Profile Picture (Optional)</label>
                    <input type="file" id="profilePicture" name="profilePicture" class="form-input" accept="image/*">
                </div>
                
                <div class="form-group">
                    <label for="bio" class="form-label">Short Bio (Optional)</label>
                    <textarea id="bio" name="bio" class="form-input" rows="3" 
                              placeholder="Tell people about yourself..."></textarea>
                </div>
                
                <button type="submit" class="submit-button">Create Account</button>
            </form>
            
            <div class="auth-links">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }
        
        // Dark mode toggle functionality
        const darkModeToggle = document.querySelector('.dark-mode-toggle');
        const body = document.body;
        
        // Check for saved dark mode preference
        const savedDarkMode = localStorage.getItem('darkMode');
        if (savedDarkMode === 'enabled') {
            body.classList.add('dark-mode');
            darkModeToggle.innerHTML = '<span class="icon">☀️</span>';
        }
        
        darkModeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDarkMode = body.classList.contains('dark-mode');
            
            if (isDarkMode) {
                darkModeToggle.innerHTML = '<span class="icon">☀️</span>';
                localStorage.setItem('darkMode', 'enabled');
            } else {
                darkModeToggle.innerHTML = '<span class="icon">🌙</span>';
                localStorage.setItem('darkMode', 'disabled');
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
